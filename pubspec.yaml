name: choke
description: "A modern decentralized BJJ match scoring and publishing app via Nostr."
publish_to: 'none'

version: 1.4.0+247

environment:
  # Floor is 3.5 because flutter_rust_bridge's generated web bindings use
  # extension types (Dart 3.3+). See docs/specs/nostr-sdk-migration.md §0.4.3.
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # UI
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Nostr

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.4

  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2

  # Utils
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  go_router: ^14.8.0

  # Package info
  package_info_plus: ^8.0.1

  # URL launcher
  url_launcher: ^6.2.0

  # Still used to ping relays from the Settings screen when the user adds one.
  # Not the app's Nostr transport any more — that is the Rust crate.
  web_socket_channel: ^2.4.0
  rust_lib_choke:
    path: rust_builder
  flutter_rust_bridge: 2.12.0

dev_dependencies:
  mutation_test: ^1.8.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/branding/bjj_black_belt.webp
  fonts:
    - family: Space Grotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
          weight: 400
        - asset: assets/fonts/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700
