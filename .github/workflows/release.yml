name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    # Exposes "is the Play service-account secret configured?" to step-level
    # `if:`, since the secrets context can't be read directly there. Lets the
    # Play upload skip cleanly (e.g. on forks) instead of failing the release.
    env:
      HAS_PLAY_SA: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Extract version from tag
        id: version
        run: |
          FULL_TAG=${GITHUB_REF#refs/tags/}
          # Refuse anything that isn't a plain vX.Y.Z tag. Tag refs can legally
          # contain shell metacharacters, and this value flows into later `run:`
          # steps — validating it here neutralizes template injection at the
          # source. Pre-release/build suffixes are rejected on purpose: the
          # version-bump step appends its own +<build>, so a suffixed tag (e.g.
          # v1.2.3+ci) would produce a malformed pubspec version.
          if ! printf '%s' "$FULL_TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Refusing to release: tag '$FULL_TAG' is not a plain vX.Y.Z tag."
            exit 1
          fi
          echo "tag=${FULL_TAG#v}" >> $GITHUB_OUTPUT
          echo "full_tag=$FULL_TAG" >> $GITHUB_OUTPUT

          # Get the previous tag for changelog range
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "prev_tag=" >> $GITHUB_OUTPUT
            echo "is_first=true" >> $GITHUB_OUTPUT
          else
            echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
            echo "is_first=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        id: changelog
        # Pass tag-derived values through env, never interpolated into shell
        # source (template-injection hardening).
        env:
          TAG: ${{ steps.version.outputs.full_tag }}
          PREV_TAG: ${{ steps.version.outputs.prev_tag }}
          IS_FIRST: ${{ steps.version.outputs.is_first }}
        run: |
          if [ "$IS_FIRST" = "true" ]; then
            # First release — all commits
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges "${PREV_TAG}..${TAG}")
          fi

          # Categorize commits
          FEATURES=$(echo "$COMMITS" | grep -iE "^- (feat|add|new)" || true)
          FIXES=$(echo "$COMMITS" | grep -iE "^- (fix|bug|patch|hotfix)" || true)
          DOCS=$(echo "$COMMITS" | grep -iE "^- (doc|docs|readme)" || true)
          OTHER=$(echo "$COMMITS" | grep -ivE "^- (feat|add|new|fix|bug|patch|hotfix|doc|docs|readme)" || true)

          # Build markdown changelog
          {
            echo "## What's New in $TAG"
            echo ""

            if [ -n "$FEATURES" ]; then
              echo "### ✨ New Features"
              echo "$FEATURES"
              echo ""
            fi

            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            if [ -n "$DOCS" ]; then
              echo "### 📚 Documentation"
              echo "$DOCS"
              echo ""
            fi

            if [ -n "$OTHER" ]; then
              echo "### 🔧 Other Changes"
              echo "$OTHER"
              echo ""
            fi

            if [ "$IS_FIRST" != "true" ]; then
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
            fi
          } > RELEASE_NOTES.md

          cat RELEASE_NOTES.md

          # Also write to CHANGELOG.md (prepend to existing)
          DATESTAMP=$(date -u +"%Y-%m-%d")
          {
            echo "# Changelog"
            echo ""
            echo "## [$TAG] - $DATESTAMP"
            echo ""

            if [ -n "$FEATURES" ]; then
              echo "### Added"
              echo "$FEATURES"
              echo ""
            fi

            if [ -n "$FIXES" ]; then
              echo "### Fixed"
              echo "$FIXES"
              echo ""
            fi

            if [ -n "$DOCS" ]; then
              echo "### Documentation"
              echo "$DOCS"
              echo ""
            fi

            if [ -n "$OTHER" ]; then
              echo "### Changed"
              echo "$OTHER"
              echo ""
            fi

            # Append previous changelog content (skip the first "# Changelog" header)
            if [ -f CHANGELOG.md ]; then
              tail -n +2 CHANGELOG.md
            fi
          } > CHANGELOG_NEW.md

          mv CHANGELOG_NEW.md CHANGELOG.md

      - name: Update version in pubspec.yaml
        env:
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          # Extract build number: count total commits
          BUILD=$(git rev-list --count HEAD)
          sed -i "s/^version: .*/version: ${VERSION}+${BUILD}/" pubspec.yaml
          echo "Updated pubspec.yaml to version: ${VERSION}+${BUILD}"
          grep "^version:" pubspec.yaml

      - name: Commit changelog and version bump
        env:
          FULL_TAG: ${{ steps.version.outputs.full_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git merge --ff-only "$FULL_TAG" || true
          git add CHANGELOG.md pubspec.yaml
          git commit -m "chore: update changelog and version for $FULL_TAG"
          git push origin main

      # The App Bundle packs native code for every ABI, so Cargokit
      # cross-compiles the Rust crate three times (arm, arm64, x86_64). Together
      # with the APK build, the NDK, and the Gradle/cargo caches this exhausts
      # the ~14 GB free on the runner ("No space left on device"). Reclaim space
      # from preinstalled toolchains this job never uses.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/share/swift /usr/local/share/powershell \
            /usr/local/share/chromium /usr/local/lib/node_modules
          sudo apt-get clean
          df -h /

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # The APK now contains a Rust library (Nostr cryptography), which
      # Cargokit cross-compiles during `flutter build apk`. Without a Rust
      # toolchain the release build fails. The version and the Android
      # targets come from rust-toolchain.toml.
      - name: Setup Rust
        run: rustup show

      # Puts sdkmanager on PATH; the runner ships the SDK but not its CLI.
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Cargokit compiles the crate through the NDK, so the version the project
      # pins must actually be installed — otherwise configuring the
      # :rust_lib_choke project dies with a bare NullPointerException. Read it
      # from build.gradle.kts so this can never drift out of sync with it.
      - name: Install Android NDK
        run: |
          NDK=$(grep -oP 'ndkVersion = "\K[^"]+' android/app/build.gradle.kts)
          echo "Installing NDK $NDK"
          sdkmanager --install "ndk;$NDK"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: cargo-release-${{ runner.os }}-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: cargo-release-${{ runner.os }}-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Verify signing secrets
        run: |
          missing=""
          [ -z "${{ secrets.KEYSTORE_BASE64 }}" ] && missing="$missing KEYSTORE_BASE64"
          [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ] && missing="$missing KEYSTORE_PASSWORD"
          [ -z "${{ secrets.KEY_PASSWORD }}" ] && missing="$missing KEY_PASSWORD"
          [ -z "${{ secrets.KEY_ALIAS }}" ] && missing="$missing KEY_ALIAS"
          if [ -n "$missing" ]; then
            echo "::error::Missing signing secrets:$missing"
            exit 1
          fi

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/choke-upload-key.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=choke-upload-key.jks" >> android/key.properties

      # arm64 only. A plain `flutter build apk` packs native code for three ABIs
      # into one file — and since the Nostr stack became a Rust library, that is
      # three copies of it. Every 64-bit Android phone made in the last decade
      # runs arm64-v8a; armeabi-v7a and x86_64 were costing ~40 MB to serve
      # 32-bit hardware nobody referees on, and emulators.
      #
      # Deliberately NOT --split-per-abi: that renames the output to
      # app-arm64-v8a-release.apk and would break the step below.
      - name: Build APK
        run: flutter build apk --release --target-platform android-arm64

      - name: Rename APK
        env:
          FULL_TAG: ${{ steps.version.outputs.full_tag }}
        run: cp build/app/outputs/flutter-apk/app-release.apk "choke-${FULL_TAG}.apk"

      # The Android App Bundle for Google Play. Unlike the sideload APK above,
      # this deliberately keeps ALL ABIs (the default): Play generates optimized
      # per-device APKs from the bundle, so every user still downloads only their
      # own architecture — including all ABIs here costs nothing at install time
      # and is what lets Play serve arm64, armeabi-v7a, and x86_64 devices.
      # It is signed with the same upload key as the APK via android/key.properties.
      - name: Build App Bundle (AAB for Google Play)
        run: flutter build appbundle --release

      - name: Rename AAB
        env:
          FULL_TAG: ${{ steps.version.outputs.full_tag }}
        run: cp build/app/outputs/bundle/release/app-release.aab "choke-${FULL_TAG}.aab"

      - name: Generate release description
        id: description
        env:
          TAG: ${{ steps.version.outputs.full_tag }}
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          # Read the categorized changes
          FEATURES=$(cat RELEASE_NOTES.md | sed -n '/### ✨/,/^###\|^$/p' | grep "^-" || true)
          FIXES=$(cat RELEASE_NOTES.md | sed -n '/### 🐛/,/^###\|^$/p' | grep "^-" || true)

          {
            echo "# 🥋 Choke ${TAG}"
            echo ""
            echo "A new version of Choke is here!"
            echo ""

            if [ -n "$FEATURES" ]; then
              FEATURE_COUNT=$(echo "$FEATURES" | wc -l)
              echo "This release brings **${FEATURE_COUNT} new feature(s)** to make your BJJ scoring experience even better:"
              echo ""
              echo "$FEATURES"
              echo ""
            fi

            if [ -n "$FIXES" ]; then
              FIX_COUNT=$(echo "$FIXES" | wc -l)
              echo "We also squashed **${FIX_COUNT} bug(s)** 🐛:"
              echo ""
              echo "$FIXES"
              echo ""
            fi

            echo "---"
            echo ""
            echo "### 📥 Install"
            echo "Download \`choke-${TAG}.apk\` below and install on your Android device."
            echo ""
            echo "### 📋 Full Changelog"
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for the complete history."
          } > RELEASE_BODY.md

          cat RELEASE_BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_BODY.md
          files: |
            choke-${{ steps.version.outputs.full_tag }}.apk
            choke-${{ steps.version.outputs.full_tag }}.aab
          generate_release_notes: false
          draft: false
          prerelease: false

      # Publish the signed bundle to Google Play's internal testing track.
      # Skipped when PLAY_SERVICE_ACCOUNT_JSON is not set, so the GitHub release
      # still succeeds. Requirements before the first automated upload works:
      #   1. Create the app in the Play Console and upload one build manually
      #      (Play won't accept API uploads until the listing exists).
      #   2. Create a Google Cloud service account, grant it access in the Play
      #      Console (Users & permissions), and store its JSON key as the
      #      PLAY_SERVICE_ACCOUNT_JSON repo secret.
      # Change `track` to `production` (or alpha/beta) once you're ready to ship
      # to users; `internal` is the safe default for automated releases.
      - name: Publish to Google Play (internal track)
        if: env.HAS_PLAY_SA == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: io.protolayer.choke
          releaseFiles: choke-${{ steps.version.outputs.full_tag }}.aab
          track: internal
          status: completed
